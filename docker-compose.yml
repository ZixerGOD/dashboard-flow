services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-flow-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-10000}
      SERVICE_NAME: ${SERVICE_NAME:-meta-leads-inconcert}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN}
      META_APP_SECRET: ${META_APP_SECRET}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION:-v20.0}
      INCONCERT_BASE_URL: ${INCONCERT_BASE_URL}
      INCONCERT_ENDPOINT: ${INCONCERT_ENDPOINT:-/api/leads}
      INCONCERT_TOKEN: ${INCONCERT_TOKEN:-}
      INCONCERT_API_KEY: ${INCONCERT_API_KEY:-}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_SSL: "false"
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: dashboard-flow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dashboard_flow}
      POSTGRES_USER: ${POSTGRES_USER:-dashboard_flow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data: